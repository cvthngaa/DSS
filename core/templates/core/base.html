<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Logistics — Hệ Thống Phân Phối Tối Ưu</title>
    <meta name="description" content="Hệ thống hỗ trợ quyết định DSS tối ưu hóa lộ trình giao hàng với 4 thuật toán TSP.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════════
           DESIGN TOKENS
        ══════════════════════════════════════════ */
        :root {
            --bg-gradient:   linear-gradient(135deg, #F1F5F9 0%, #E0E7FF 100%);
            --sidebar-bg:    #F8FAFC;
            --topbar-bg:     linear-gradient(90deg, #3B82F6, #6366F1);
            --card-bg:       #ffffff;
            --primary:       #1E293B;
            --secondary:     #475569;
            --text-muted:    #94A3B8;
            --accent:        #3B82F6;
            --accent-2:      #6366F1;
            --accent-soft:   #EFF6FF;
            --success:       #22C55E;
            --success-2:     #4ADE80;
            --warning:       #F59E0B;
            --danger:        #EF4444;
            --border:        #E2E8F0;
            --shadow-sm:     0 2px 8px rgba(0,0,0,.05);
            --shadow:        0 8px 25px rgba(0,0,0,.08);
            --shadow-md:     0 10px 30px rgba(0,0,0,.10);
            --shadow-lg:     0 16px 40px rgba(0,0,0,.12);
            --radius:        16px;
            --radius-sm:     10px;
            --sidebar-w:     68px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
        }

        /* ══════════════════════════════════════════
           SIDEBAR
        ══════════════════════════════════════════ */
        .sidebar {
            width: var(--sidebar-w);
            min-height: 100vh;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 0;
            position: fixed;
            left: 0; top: 0; bottom: 0;
            z-index: 100;
            border-right: 1px solid var(--border);
            box-shadow: 2px 0 16px rgba(0,0,0,.04);
        }

        /* Logo */
        .sidebar-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            text-decoration: none;
            margin-bottom: 28px;
            box-shadow: 0 4px 14px rgba(59,130,246,.35);
            transition: transform .2s, box-shadow .2s;
        }

        .sidebar-logo:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 18px rgba(59,130,246,.45);
        }

        /* Nav */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            width: 100%;
            padding: 0 8px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 9px 4px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: .2px;
            transition: background .18s, color .18s;
            position: relative;
        }

        .nav-icon {
            font-size: 1.15rem;
            line-height: 1;
            opacity: .6;
            transition: opacity .18s, transform .18s;
        }

        .nav-item:hover                  { background: rgba(59,130,246,.08); color: var(--accent); }
        .nav-item:hover .nav-icon        { opacity: 1; transform: scale(1.1); }
        .nav-item.active                 { background: var(--accent-soft); color: var(--accent); }
        .nav-item.active .nav-icon       { opacity: 1; }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -8px; top: 50%;
            transform: translateY(-50%);
            width: 3px; height: 55%;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            border-radius: 0 3px 3px 0;
        }

        /* Run CTA */
        .nav-item.nav-run {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            margin-top: 4px;
        }
        .nav-item.nav-run .nav-icon { opacity: 1; color: #fff; }
        .nav-item.nav-run           { color: #fff; }
        .nav-item.nav-run:hover {
            background: linear-gradient(135deg, #2563EB, #4F46E5);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(59,130,246,.4);
        }
        .nav-item.nav-run::before   { display: none; }

        .sidebar-divider {
            width: 32px; height: 1px;
            background: var(--border);
            margin: 8px auto;
        }

        .sidebar-bottom { width: 100%; padding: 0 8px; }

        .sidebar-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64748B, #475569);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
        }

        /* ══════════════════════════════════════════
           APP WRAPPER
        ══════════════════════════════════════════ */
        .app-wrapper {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar — gradient */
        .topbar {
            background: var(--topbar-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            box-shadow: 0 4px 20px rgba(59,130,246,.25);
        }

        .topbar-brand h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            letter-spacing: -.3px;
        }

        .topbar-brand h1 span { opacity: .75; font-weight: 400; }

        .topbar-brand p {
            font-size: 0.72rem;
            color: rgba(255,255,255,.65);
            margin-top: 1px;
        }

        .server-status {
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 0.75rem;
            color: #fff;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 7px;
            backdrop-filter: blur(4px);
        }

        .server-status .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #4ADE80;
            animation: pulse 2.2s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.6; transform:scale(1.3); }
        }

        /* Page body */
        .page-body {
            padding: 24px 28px 36px;
            flex: 1;
        }

        /* ══════════════════════════════════════════
           SCROLLBAR
        ══════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        /* ══════════════════════════════════════════
           SHARED COMPONENTS
        ══════════════════════════════════════════ */

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
            border: 1px solid rgba(226,232,240,.5);
            transition: transform .25s, box-shadow .25s;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        /* Section label */
        .section-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -.15px;
        }

        .section-badge {
            display: inline-flex; align-items: center;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.68rem; font-weight: 700;
            padding: 2px 9px; border-radius: 20px;
            margin-left: 8px;
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(59,130,246,.35);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 18px rgba(59,130,246,.45);
            color: #fff;
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--secondary);
            border: 1.5px solid var(--border);
            border-radius: 12px;
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .btn-success {
            background: linear-gradient(90deg, var(--success), var(--success-2));
            color: #fff;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(34,197,94,.3);
        }
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(34,197,94,.4);
            color: #fff;
        }

        .btn-danger {
            background: #FEF2F2;
            color: var(--danger);
            border: 1.5px solid #FECACA;
            border-radius: 8px;
        }
        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 9px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 600;
        }
        .badge-success { background: #DCFCE7; color: #15803D; }
        .badge-warning { background: #FEF9C3; color: #A16207; }
        .badge-danger  { background: #FEE2E2; color: #B91C1C; }
        .badge-info    { background: #DBEAFE; color: #1D4ED8; }
        .badge-purple  { background: #EDE9FE; color: #6D28D9; }
        .badge-gray    { background: #F1F5F9; color: #64748B; }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex; align-items: flex-start; gap: 10px;
            animation: fadeIn .25s ease;
        }
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(-6px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .alert-success { background: linear-gradient(135deg,#F0FDF4,#DCFCE7); color:#15803D; border-left:3px solid var(--success); }
        .alert-error   { background: #FEF2F2; color:#B91C1C; border-left:3px solid var(--danger); }
        .alert-info    { background: linear-gradient(135deg,#EFF6FF,#DBEAFE); color:#1D4ED8; border-left:3px solid var(--accent); }

        /* Tables */
        .data-table { width:100%; border-collapse:collapse; font-size:.85rem; }
        .data-table th {
            padding: 9px 14px;
            text-align: left;
            font-size: .7rem; font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(226,232,240,.5);
            color: var(--secondary);
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tbody tr { transition: background .12s; }
        .data-table tbody tr:hover td { background: #F8FAFF; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="{% url 'home' %}" class="sidebar-logo" title="DSS Logistics">🚚</a>

        <nav class="sidebar-nav">
            <a href="{% url 'home' %}"
               class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
               title="Tổng quan">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="{% url 'manage_locations' %}"
               class="nav-item {% if request.resolver_match.url_name == 'manage_locations' %}active{% endif %}"
               title="Địa điểm">
                <span class="nav-icon">📍</span>
                <span>Địa điểm</span>
            </a>
            <a href="{% url 'upload_data' %}"
               class="nav-item {% if request.resolver_match.url_name == 'upload_data' %}active{% endif %}"
               title="Upload CSV">
                <span class="nav-icon">☁️</span>
                <span>Upload</span>
            </a>
            <div class="sidebar-divider"></div>
            <a href="{% url 'map_result' %}"
               class="nav-item nav-run {% if request.resolver_match.url_name == 'map_result' %}active{% endif %}"
               title="Chạy TSP">
                <span class="nav-icon">▶</span>
                <span>Chạy TSP</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <div class="sidebar-divider"></div>
            <div class="sidebar-avatar" title="DSS System">🤖</div>
        </div>
    </aside>

    <!-- APP WRAPPER -->
    <div class="app-wrapper">

        <div class="topbar">
            <div class="topbar-brand">
                <h1>DSS Logistics <span>— Tối Ưu Hóa Tuyến Đường</span></h1>
                <p>Hệ thống so sánh 4 thuật toán TSP trên bản đồ đường bộ thực tế OSRM</p>
            </div>
            <div class="server-status">
                <span class="dot"></span>
                Server đang chạy
            </div>
        </div>

        <main class="page-body">
            {% block content %}{% endblock %}
        </main>

    </div>

</body>
</html>
