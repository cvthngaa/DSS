{% extends 'core/base.html' %}

{% block content %}
<style>
    .upload-container {
        max-width: 600px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .upload-container h2 {
        color: var(--primary);
        margin-bottom: 20px;
        text-align: center;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 10px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: var(--secondary);
    }
    .form-group input[type="file"] {
        display: block;
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 4px;
    }
    .btn-submit {
        background-color: var(--primary);
        color: #fff;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 1.1rem;
        transition: background 0.3s;
    }
    .btn-submit:hover {
        background-color: var(--secondary);
    }
    .messages {
        margin-bottom: 20px;
        padding: 15px;
        border-radius: 5px;
        background-color: #d4edda;
        color: #155724;
        border-left: 5px solid #28a745;
    }
</style>

<div class="upload-container">
    <h2>Cập Nhật Dữ Liệu CSV</h2>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="locations_file">1. Tệp Danh sách Điểm (locations.csv)</label>
            <input type="file" name="locations_file" id="locations_file" accept=".csv">
            <small style="color:#666; display:block; margin-top:5px;">Cấu trúc: id, name, x, y, is_depot (0/1)</small>
        </div>
        
        <div class="form-group">
            <label for="routes_file">2. Tệp Tuyến đường Mẫu (routes.csv)</label>
            <input type="file" name="routes_file" id="routes_file" accept=".csv">
            <small style="color:#666; display:block; margin-top:5px;">Cấu trúc: route_id, route_name, location_id, stop_order</small>
        </div>
        
        <button type="submit" class="btn-submit">Tải Lên và Cập Nhật</button>
    </form>
</div>
{% endblock %}
